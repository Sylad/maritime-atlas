## ─── GeoServer cluster load balancer (Sprint 9) ────────────────────
##
## Ce nginx interne sert d'alias `geoserver:8080` pour la rétro-compat :
## tous les services métier (provisioner, weather-fetcher, sst-fetcher,
## api, frontend) continuent à appeler `http://geoserver:8080/geoserver`
## exactement comme avant le cluster. Zéro modif côté services.
##
## Stratégies :
##   * ip_hash → sticky session par IP source. Critique pour l'admin UI
##     qui maintient un état session-scoped (formulaires multi-step,
##     CSRF tokens). Sans sticky, l'UI part en vrille dès qu'on POST.
##   * upstream avec max_fails=3 + fail_timeout=30s → si un replica
##     part en vrille, nginx l'écarte pendant 30s puis retente. Le
##     trafic WMS/WFS continue à servir sur les 2 autres.
##   * proxy_buffering off + read_timeout 120s → WMS GetMap peut être
##     lent sur les rasters lourds (mosaic store SST + interpolation).

upstream geoserver_cluster {
    # ip_hash assure que le même client tape toujours le même replica.
    # Pour WMS anonyme c'est neutre (pas de session), pour l'admin UI
    # c'est indispensable. Sans pollution du DNS rotatif Docker.
    ip_hash;

    server geoserver-1:8080 max_fails=3 fail_timeout=30s;
    server geoserver-2:8080 max_fails=3 fail_timeout=30s;
    server geoserver-3:8080 max_fails=3 fail_timeout=30s;

    # Keepalive vers les replicas (HTTP/1.1) — réduit la latence de
    # ~5-10ms par requête WMS, et c'est ~50 GetMap/s côté frontend.
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # Endpoint de health interne pour les autres services (depends_on).
    # Renvoie OK si nginx tourne ; la santé réelle des replicas est
    # checkée par leurs propres healthchecks dans docker-compose.
    location = /lb-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://geoserver_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Retry next-upstream sur 502/503/504/timeout → si un replica
        # rate, nginx retape le suivant transparent au client.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}
