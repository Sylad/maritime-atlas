# GeoServer hz-cluster runtime config.
# Lu par HzCluster + ClusterConfig au boot Spring. Présent dans
# ${GEOSERVER_DATA_DIR}/cluster/ via le wrapper bootstrap script.

# Active la synchro cluster (false = plugin loaded mais no-op)
enabled=true

# Méthode de sync : "reload" = chaque replica reload son cache à chaque
# event Hazelcast. Alternative "all" plus agressive (sync via Hazelcast
# distributed map directement). "reload" suffit pour notre cas.
sync_method=reload

# Délai en secondes avant de propager un event après une mutation REST
# (compense les writes batch sur le catalog).
sync_delay=5

# Timeout ACK avant de considérer un peer down (ms).
acktimeout=2000

# Session sharing entre replicas via Hazelcast (au cas où on stoppe
# tomcat_sessions PostgreSQL). Pour l'instant tomcat_sessions est notre
# canal session, donc on garde false ici.
session_sharing=false
session_sticky=false
