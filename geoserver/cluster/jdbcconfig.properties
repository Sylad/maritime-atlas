# ─── GeoServer JDBCConfig — Sprint 9 (cluster catalog) ───────────────
#
# Persist the catalog (workspaces, layers, styles, datastores) in
# Postgres so that the 3 replicas geoserver-1/2/3 share the same view.
#
# initdb=true        → bootstrap les tables au premier boot (idempotent)
# import=true        → import du catalog XML déjà présent dans le data_dir
#                      au premier boot, puis désactive lui-même import
#                      en flippant ce flag dans le fichier après import OK.
# enabled=true       → active le mode JDBC (sans ça, GeoServer reste sur
#                      le catalog XML local et le cluster ne sert à rien).
# cacheProviderBeanName=ehCacheProvider permet le cache mémoire local
# pour éviter de retaper Postgres à chaque GetMap.
#
# Refs :
#   https://docs.geoserver.org/latest/en/user/community/jdbcconfig/installation.html
# ─────────────────────────────────────────────────────────────────────

enabled=true
initdb=true
import=true

# Connection — substitué au démarrage par l'entrypoint (envsubst).
# Le placeholder permet de garder le fichier versionné sans secrets.
jdbcUrl=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=geoserver
driverClassName=org.postgresql.Driver
username=${POSTGRES_USER}
password=${POSTGRES_PASSWORD}

# Connection pool — 3 replicas × 10 connexions = 30 max, large pour Postgres.
pool.minIdle=2
pool.maxActive=10
pool.maxIdle=5
pool.testWhileIdle=true
pool.validationQuery=SELECT 1
pool.timeBetweenEvictionRunsMillis=30000

# Cache mémoire (par replica). Évite de hammer Postgres sur les GetMap
# en rafale ; la cohérence est garantie par les events JDBCConfig que
# chaque replica émet lors d'un update REST (catalog versionné en DB).
cacheProviderBeanName=ehCacheProvider
