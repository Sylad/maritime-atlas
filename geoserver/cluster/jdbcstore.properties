# ─── GeoServer JDBCStore — Sprint 9 (cluster resources/files) ────────
#
# JDBCConfig persiste le catalog (metadata XML → tables relationnelles).
# JDBCStore va plus loin : il stocke aussi les fichiers de ressources
# (SLD, freemarker templates, layer thumbnails, security configs) sous
# forme de blobs JDBC. Sans lui, les replicas continueraient à se
# regarder dans leurs data_dir locaux respectifs pour les SLD —
# divergence garantie dès qu'on upload un style via l'UI/REST.
#
# Réutilise les mêmes credentials que JDBCConfig (même schema).
#
# Refs :
#   https://docs.geoserver.org/latest/en/user/community/jdbcstore/installation.html
# ─────────────────────────────────────────────────────────────────────

enabled=true
initdb=true
import=true
ignoreUnmodified=true

jdbcUrl=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=geoserver
driverClassName=org.postgresql.Driver
username=${POSTGRES_USER}
password=${POSTGRES_PASSWORD}

# Petit pool dédié — JDBCStore est moins sollicité que JDBCConfig
pool.minIdle=1
pool.maxActive=5
pool.maxIdle=3
pool.testWhileIdle=true
pool.validationQuery=SELECT 1
