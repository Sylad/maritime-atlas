# GeoServer Control-Flow extension — limit concurrent requests per service
# to prevent thread starvation when a client (eg OpenLayers map view)
# bursts several WMS GetMap requests simultaneously (SST + wind + waves
# + alerts + lightning au pan/zoom).
#
# Calibré 2 replicas × Big-Blue (8 cores total alloués) avec Xmx6g chacun
# (Sylvain 2026-05-15). Les caps sont PER-REPLICA. Sticky-session via
# cookie ingress garantit qu'un client OL reste sur la même replica
# (sinon GWC tile cache reconstruit côté autre replica = latence).
#
# Refs :
#  - https://docs.geoserver.org/stable/en/user/extensions/controlflow/index.html
#  - https://github.com/geoserver/geoserver/blob/main/src/extension/control-flow/

# Plafond global toutes requêtes OWS confondues (per replica).
ows.global=8

# WMS GetMap : 3 simultanées max par replica. ImageWMS OL bursts plusieurs
# layers (SST + wind + waves + …) au pan/zoom → on met en file d'attente
# plutôt que stacker en heap. 3 × 800MB IDW + buffer = ~3 GB / 6 GB heap.
ows.wms.getmap=3

# WFS GetFeature : 3 max. Sources vectorielles (vessels, buoys, …).
ows.wfs.getfeature=3

# WPS Execute : 1 max. IDW custom est très lourd, sérialise.
ows.wps.execute=1

# Plafond par utilisateur (cookie / IP) : un client OL pan/zoom seul ne
# peut pas saturer la replica avec ses GetMap parallèles.
user=4

# Timeout sur la file d'attente : si une requête poireaute >30s, on rejette
# proprement (HTTP 503) au lieu de timeout silencieux côté LB.
timeout=30
