# GeoServer Control-Flow extension — limit concurrent requests per service
# to prevent thread starvation when a client (eg OpenLayers tile grid)
# bursts dozens of WMS GetMap requests simultaneously.
#
# Calibré pour NAS quad-core × 3 replicas (~12 cores théoriques) :
#  - laisse de la marge pour les healthchecks Docker (LB poll /web/)
#  - cap WPS et SLD avec IDW chain (hot path lourd)
#  - per-user cap pour qu'un seul client OL ne sature pas tout
#
# Refs :
#  - https://docs.geoserver.org/stable/en/user/extensions/controlflow/index.html
#  - https://github.com/geoserver/geoserver/blob/main/src/extension/control-flow/

# Plafond global toutes requêtes OWS confondues
ows.global=16

# WMS GetMap : 6 simultanées max. Cas hot (tuiles 256x256) — le reste va
# en file d'attente plutôt que 502/timeout.
ows.wms.getmap=6

# WFS GetFeature : 4 max. Sources vectorielles (vessels, buoys, etc.)
ows.wfs.getfeature=4

# WPS Execute : 2 max. IDW est lourd, on cap fort.
ows.wps.execute=2

# Plafond par utilisateur (cookie / IP) : un client seul ne peut pas
# saturer le serveur avec ses tuiles parallèles.
user=8

# Timeout sur la file d'attente : si une requête poireaute >30s, on rejette
# proprement (HTTP 503) au lieu de timeout silencieux côté LB.
timeout=30
