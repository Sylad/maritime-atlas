name: Build & push to GHCR

# Push automatique sur chaque push main, ou via run manuel (workflow_dispatch).
# Détecte les services modifiés via path filter — ne rebuild que ce qui a
# changé pour économiser les minutes runner.
#
# Workflow type :
#   1. Sylvain commit + push sur main
#   2. GitHub Actions détecte quel(s) service(s) ont changé
#   3. Pour chaque service modifié : docker build + tag :sha-short + :latest
#      + push sur ghcr.io/sylad/aetherwx-<service> ET ghcr.io/sylad/
#      maritime-<service> (dual-tag pendant la transition rebrand 2026-05-20)
#   4. À la fin : trigger optionnel ArgoCD refresh via webhook (TODO)

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
      - 'geoserver/**'
      - 'qa/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service à rebuild (vide = auto-detect par diff)'
        required: false
        type: string

permissions:
  contents: read
  packages: write   # nécessaire pour push ghcr.io/sylad/*

jobs:
  qa-drift:
    name: QA layer-coverage drift
    runs-on: ubuntu-latest
    # Gate anti-drift : si un layer a été ajouté/retiré dans globe.component.ts
    # sans régénérer qa/layers.manifest.json, drift.mjs sort en exit 1 et bloque
    # le build (cf needs ci-dessous). SKIP_GETCAPS=1 → check statique pur
    # (registry FE vs manifest committé), aucun accès réseau prod requis.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check layer manifest drift
        run: SKIP_GETCAPS=1 node qa/drift.mjs

  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 0 = tout l'historique : nécessaire pour diff la plage COMPLÈTE d'un
          # push multi-commits (before..after), pas juste le dernier commit.
          fetch-depth: 0

      - name: Set matrix from changes
        id: set-matrix
        run: |
          if [ -n "${{ inputs.service }}" ]; then
            # Run manuel ciblé sur un service
            echo "services=[\"${{ inputs.service }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Auto-detect : liste les services dont les fichiers ont changé
          # Catalogue des paths surveillés → service name
          declare -A MAP=(
            ["services/api"]="api"
            ["services/ais-ingester"]="ais-ingester"
            ["services/ais-decoder"]="ais-decoder"
            ["services/lightning-fetcher"]="lightning-fetcher"
            ["services/buoy-fetcher"]="buoy-fetcher"
            ["services/track-builder"]="track-builder"
            ["services/alerts-engine"]="alerts-engine"
            ["services/weather-fetcher"]="weather-fetcher"
            ["services/weather-fetcher-arpege"]="weather-fetcher-arpege"
            ["services/weather-fetcher-arome"]="weather-fetcher-arome"
            ["services/sst-fetcher"]="sst-fetcher"
            ["services/grib-parser"]="grib-parser"
            ["services/glofas-fetcher"]="glofas-fetcher"
            ["services/maritime-style-bootstrap"]="style-bootstrap"
            ["frontend"]="frontend"
            ["geoserver"]="geoserver"
          )
          # 2026-06-18 fix : diffe la PLAGE COMPLÈTE du push (before..after) et
          # non juste HEAD~1..HEAD. Sinon, un push de N commits dont le DERNIER
          # ne touche aucun service (ex: commit qa-only) skippait à tort le build
          # des services modifiés dans les commits précédents (vécu : widget
          # all-layers non buildé car suivi d'un commit qa). Fallback HEAD~1 pour
          # les premiers commits / force-push (before = 000…0).
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          MATRIX=()
          for path in "${!MAP[@]}"; do
            if echo "$CHANGED" | grep -q "^$path/"; then
              MATRIX+=("\"${MAP[$path]}\"")
            fi
          done
          if [ ${#MATRIX[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            JOINED=$(IFS=,; echo "${MATRIX[*]}")
            echo "services=[$JOINED]" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: Build & push ${{ matrix.service }}
    # needs qa-drift : aucune image n'est buildée/poussée tant que la couverture
    # QA des layers a dérivé (un layer FE non couvert bloque tout le build).
    needs: [detect-changes, qa-drift]
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Sylad
          # PAT (write:packages) requis car les packages sont owned par
          # user account (pas org/repo). GITHUB_TOKEN ne suffit pas →
          # 403 Forbidden au push. Setup secret repo : Settings →
          # Secrets and variables → Actions → New : GHCR_TOKEN.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute context path
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            frontend)         echo "path=frontend"   >> $GITHUB_OUTPUT ;;
            geoserver)        echo "path=geoserver"  >> $GITHUB_OUTPUT ;;
            style-bootstrap)  echo "path=services/maritime-style-bootstrap" >> $GITHUB_OUTPUT ;;
            *)                echo "path=services/${{ matrix.service }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Compute image name & tag
        id: meta
        # 2026-05-20 Sprint 0 rebrand phase 2 : dual-tag transition.
        # On tag SIMULTANÉMENT sur l'ancien nom (maritime-*) et le
        # nouveau (aetherwx-*) pendant la fenêtre de migration. Une fois
        # toutes les images aetherwx-* présentes en GHCR ET les values.yaml
        # gitops bumpés, on cleanera le tag ancien (TODO commit séparé).
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_NEW="ghcr.io/sylad/aetherwx-${{ matrix.service }}"
          IMAGE_OLD="ghcr.io/sylad/maritime-${{ matrix.service }}"
          echo "image=$IMAGE_NEW" >> $GITHUB_OUTPUT
          echo "tags=$IMAGE_NEW:sha-$SHA_SHORT,$IMAGE_NEW:latest,$IMAGE_OLD:sha-$SHA_SHORT,$IMAGE_OLD:latest" >> $GITHUB_OUTPUT
          echo "sha-tag=sha-$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Summary
        run: |
          echo "✅ Pushed: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha-tag }}"
          echo "✅ Pushed: ${{ steps.meta.outputs.image }}:latest"
          echo ""
          echo "To deploy on K8s clusters :"
          echo "  ./scripts/upgrade-app.sh maritime ${{ steps.meta.outputs.sha-tag }}"
          echo "(or wait 3 min for ArgoCD auto-refresh if values.yaml updated)"
