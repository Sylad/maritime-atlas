name: Build & push to GHCR

# Push automatique sur chaque push main, ou via run manuel (workflow_dispatch).
# Détecte les services modifiés via path filter — ne rebuild que ce qui a
# changé pour économiser les minutes runner.
#
# Workflow type :
#   1. Sylvain commit + push sur main
#   2. GitHub Actions détecte quel(s) service(s) ont changé
#   3. Pour chaque service modifié : docker build + tag :sha-short + :latest
#      + push sur ghcr.io/sylad/maritime-<service>
#   4. À la fin : trigger optionnel ArgoCD refresh via webhook (TODO)

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
      - 'geoserver/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service à rebuild (vide = auto-detect par diff)'
        required: false
        type: string

permissions:
  contents: read
  packages: write   # nécessaire pour push ghcr.io/sylad/*

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set matrix from changes
        id: set-matrix
        run: |
          if [ -n "${{ inputs.service }}" ]; then
            # Run manuel ciblé sur un service
            echo "services=[\"${{ inputs.service }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Auto-detect : liste les services dont les fichiers ont changé
          # Catalogue des paths surveillés → service name
          declare -A MAP=(
            ["services/api"]="api"
            ["services/ais-ingester"]="ais-ingester"
            ["services/ais-decoder"]="ais-decoder"
            ["services/lightning-fetcher"]="lightning-fetcher"
            ["services/buoy-fetcher"]="buoy-fetcher"
            ["services/track-builder"]="track-builder"
            ["services/alerts-engine"]="alerts-engine"
            ["services/weather-fetcher"]="weather-fetcher"
            ["services/weather-fetcher-arpege"]="weather-fetcher-arpege"
            ["services/weather-fetcher-arome"]="weather-fetcher-arome"
            ["services/sst-fetcher"]="sst-fetcher"
            ["services/grib-parser"]="grib-parser"
            ["frontend"]="frontend"
            ["geoserver"]="geoserver"
          )
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          MATRIX=()
          for path in "${!MAP[@]}"; do
            if echo "$CHANGED" | grep -q "^$path/"; then
              MATRIX+=("\"${MAP[$path]}\"")
            fi
          done
          if [ ${#MATRIX[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            JOINED=$(IFS=,; echo "${MATRIX[*]}")
            echo "services=[$JOINED]" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: Build & push ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Sylad
          # PAT (write:packages) requis car les packages sont owned par
          # user account (pas org/repo). GITHUB_TOKEN ne suffit pas →
          # 403 Forbidden au push. Setup secret repo : Settings →
          # Secrets and variables → Actions → New : GHCR_TOKEN.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute context path
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            frontend)   echo "path=frontend"   >> $GITHUB_OUTPUT ;;
            geoserver)  echo "path=geoserver"  >> $GITHUB_OUTPUT ;;
            *)          echo "path=services/${{ matrix.service }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Compute image name & tag
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/sylad/maritime-${{ matrix.service }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tags=$IMAGE:sha-$SHA_SHORT,$IMAGE:latest" >> $GITHUB_OUTPUT
          echo "sha-tag=sha-$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Summary
        run: |
          echo "✅ Pushed: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha-tag }}"
          echo "✅ Pushed: ${{ steps.meta.outputs.image }}:latest"
          echo ""
          echo "To deploy on K8s clusters :"
          echo "  ./scripts/upgrade-app.sh maritime ${{ steps.meta.outputs.sha-tag }}"
          echo "(or wait 3 min for ArgoCD auto-refresh if values.yaml updated)"
