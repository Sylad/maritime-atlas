name: maritime-atlas

services:
  # ─── Storage : PostgreSQL + PostGIS + TimescaleDB ──────────────────
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: maritime-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maritime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maritime}
      POSTGRES_DB: ${POSTGRES_DB:-maritime}
    ports:
      # 5432 occupé sur l'host NAS — on expose sur 15432 pour éviter le clash.
      # Les services internes (ais-decoder) utilisent toujours postgres:5432.
      - "15432:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maritime}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Messaging : RabbitMQ ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: maritime-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-maritime}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-maritime}
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Tile/WFS server : GeoServer cluster (3 replicas, sprint 9) ────
  # Pattern cluster officiel :
  #   * catalog (workspaces/layers/styles) partagé via JDBCConfig +
  #     JDBCStore (community extensions) — schema `geoserver` dans la
  #     base maritime existante. Vrai pattern enterprise.
  #   * data_dir volume `geoserver-data` mount partagé (RWX) entre les
  #     3 replicas — porte les blobs SLD + properties JDBCConfig/Store.
  #   * sessions admin UI cohérentes via nginx `ip_hash` (sticky).
  #     JDBCSessionDataStore Jetty demande de patcher le WAR, pas
  #     proportionné pour notre besoin ; sticky atteint le même but UX.
  #
  # Anchor YAML `&geoserver-base` factorise la config commune ; chaque
  # replica override juste container_name + GEOSERVER_NODE_ID. Tout le
  # reste (image, env, volumes, healthcheck) est identique.
  geoserver-1: &geoserver-base
    image: docker.osgeo.org/geoserver:2.28.2
    container_name: maritime-geoserver-1
    environment: &geoserver-env
      GEOSERVER_NODE_ID: geoserver-1
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      INSTALL_EXTENSIONS: "true"
      STABLE_EXTENSIONS: "wps,csw,inspire"
      # JDBCConfig + JDBCStore = catalog clusterisé en Postgres.
      # Ces deux extensions sont en `community` car non-stable upstream,
      # mais c'est le mécanisme officiel recommandé pour le multi-node.
      COMMUNITY_EXTENSIONS: "jdbcconfig,jdbcstore"
      EXTRA_JAVA_OPTS: "-Xms512m -Xmx2g"
      # CORS — chaque replica doit le re-déclarer.
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "*"
      # Credentials Postgres injectés dans les .properties par le wrapper
      # cluster-bootstrap.sh via envsubst.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-maritime}
      POSTGRES_USER: ${POSTGRES_USER:-maritime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maritime}
    volumes: &geoserver-volumes
      - geoserver-data:/opt/geoserver_data
      - coverage-data:/coverage
      # Templates jdbcconfig.properties / jdbcstore.properties (lecture
      # seule) + entrypoint wrapper qui les hydrate au boot.
      - ./geoserver/cluster:/cluster-config:ro
    entrypoint: ["/bin/bash", "/cluster-config/cluster-bootstrap.sh"]
    healthcheck: &geoserver-healthcheck
      test: ["CMD-SHELL", "curl -sf -u ${GEOSERVER_ADMIN_USER:-admin}:${GEOSERVER_ADMIN_PASSWORD:-geoserver} http://localhost:8080/geoserver/rest/about/status > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  geoserver-2:
    <<: *geoserver-base
    container_name: maritime-geoserver-2
    environment:
      <<: *geoserver-env
      GEOSERVER_NODE_ID: geoserver-2
    # Replica 2/3 attendent que replica-1 ait initialisé les tables
    # JDBCConfig (initdb=true ne tourne qu'au premier boot, après c'est
    # un no-op idempotent). Évite race au tout premier `compose up`.
    depends_on:
      postgres:
        condition: service_healthy
      geoserver-1:
        condition: service_healthy

  geoserver-3:
    <<: *geoserver-base
    container_name: maritime-geoserver-3
    environment:
      <<: *geoserver-env
      GEOSERVER_NODE_ID: geoserver-3
    depends_on:
      postgres:
        condition: service_healthy
      geoserver-1:
        condition: service_healthy

  # Alias `geoserver` — service léger qui pointe vers le LB nginx du
  # frontend pour que les autres services (provisioner, weather-fetcher,
  # sst-fetcher, api) continuent à appeler `http://geoserver:8080/geoserver`
  # exactement comme avant. Zéro changement côté services métier.
  geoserver:
    image: nginx:alpine
    container_name: maritime-geoserver-lb
    volumes:
      - ./geoserver/cluster/nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${GEOSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/geoserver/web/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      geoserver-1:
        condition: service_healthy
      geoserver-2:
        condition: service_healthy
      geoserver-3:
        condition: service_healthy
    restart: unless-stopped

  # ─── GeoServer auto-provisioner (one-shot sidecar) ─────────────────
  # Crée idempotamment workspace + datastore PostGIS + layers via REST.
  # Pattern alternatif au JAR Spring custom — versionné dans le repo,
  # lisible, reproductible. S'exécute une fois puis exit 0.
  geoserver-provisioner:
    image: alpine/curl:latest
    container_name: maritime-geoserver-provisioner
    env_file: .env
    environment:
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-maritime}
      POSTGRES_USER: ${POSTGRES_USER:-maritime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maritime}
    volumes:
      - ./geoserver/provision.sh:/provision.sh:ro
      - ./geoserver/styles:/styles:ro
    command: ["sh", "/provision.sh"]
    depends_on:
      geoserver:
        condition: service_healthy
    restart: "no"

  # ─── Producer : ais-ingester ───────────────────────────────────────
  # Connect to aisstream.io websocket, filter Bretagne bbox, publish raw
  # JSON messages on RabbitMQ exchange `ais.raw`.
  ais-ingester:
    build: ./services/ais-ingester
    container_name: maritime-ais-ingester
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─── Worker : ais-decoder ──────────────────────────────────────────
  # Consume `ais.raw`, normalize, INSERT in PostGIS (vessel_positions
  # hypertable + UPSERT vessels). Publish enriched events on `ais.positions`.
  ais-decoder:
    build: ./services/ais-decoder
    container_name: maritime-ais-decoder
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
      DATABASE_URL: postgres://${POSTGRES_USER:-maritime}:${POSTGRES_PASSWORD:-maritime}@postgres:5432/${POSTGRES_DB:-maritime}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─── Worker : track-builder (sprint 2) ─────────────────────────────
  # Cron horaire (xx:35) qui agrège vessel_positions → vessel_tracks_daily
  # (LineStrings par mmsi+day). Permet à GeoServer de servir des tracks
  # pré-aggregés en WFS, instantané même sur 30j d'historique.
  track-builder:
    build: ./services/track-builder
    container_name: maritime-track-builder
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-maritime}:${POSTGRES_PASSWORD:-maritime}@postgres:5432/${POSTGRES_DB:-maritime}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Worker : alerts-engine (sprint 10) ───────────────────────────
  # Souscrit à ais.positions + lightning.strike + raster.ready. Applique
  # règles métier (high-wind sur cargo/tanker, lightning à <10km d'un
  # navire) et publie sur exchange alerts.maritime + persiste en hypertable.
  # Cooldown 30min par (mmsi, kind) pour éviter le spam.
  alerts-engine:
    build: ./services/alerts-engine
    container_name: maritime-alerts-engine
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-maritime}:${POSTGRES_PASSWORD:-maritime}@postgres:5432/${POSTGRES_DB:-maritime}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
      WIND_ARROWS_DIR: /wind-arrows
      WIND_SPEED_ALERT_THRESHOLD: "10"
      LIGHTNING_PROXIMITY_KM: "10"
      COOLDOWN_MIN: "30"
    volumes:
      - wind-arrows-data:/wind-arrows:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─── Worker : lightning-fetcher (sprint 7) ────────────────────────
  # Consomme le WebSocket public Blitzortung community, décode LZW,
  # filtre la bbox France, persiste dans la hypertable lightning_strikes
  # (TimescaleDB retention 7 jours). Publie chaque strike sur le topic
  # exchange `lightning.strike` avec routing_key = geohash3.
  lightning-fetcher:
    build: ./services/lightning-fetcher
    container_name: maritime-lightning-fetcher
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-maritime}:${POSTGRES_PASSWORD:-maritime}@postgres:5432/${POSTGRES_DB:-maritime}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─── Worker : weather-fetcher (sprint 4a) ─────────────────────────
  # Cron 4×/jour (04/10/16/22 UTC, calé sur runs NOAA +4h de latence) qui
  # télécharge GFS (vent 10m UGRD/VGRD) + WaveWatch III (HTSGW + DIRPW)
  # via les CGI subsetters NOMADS, recadre bbox France, exporte en
  # GeoTIFF time-tagged dans 3 mosaic stores partagés (wind_speed,
  # wave_hs, wave_dir). Au premier fetch crée les coverage stores +
  # active time dimensions. Service Python (xarray + cfgrib + gdal).
  weather-fetcher:
    build: ./services/weather-fetcher
    container_name: maritime-weather-fetcher
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      WIND_DIR: /coverage/wind-speed
      WAVE_HS_DIR: /coverage/wave-hs
      WAVE_DIR_DIR: /coverage/wave-dir
      WIND_ARROWS_DIR: /wind-arrows
      FORECAST_HOURS: "72"
      FORECAST_STEP: "6"
    volumes:
      - coverage-data:/coverage
      - wind-arrows-data:/wind-arrows
    depends_on:
      - geoserver
    restart: unless-stopped

  # ─── Worker : weather-fetcher-arome (sprint 11) ───────────────────
  # Cron 4×/jour (02:30 / 08:30 / 14:30 / 20:30 UTC, alignés sur les runs
  # AROME +2h de latence) qui télécharge les bundles SP1 0025 de Météo-France
  # depuis le bucket public PNT (object.data.gouv.fr/meteofrance-pnt) — AUCUNE
  # clé API requise (open data, sans inscription). Résolution 0.025° (~2.5km)
  # = 10× plus fin que le GFS 0.25° (25km) côté finesse côtière. Extrait
  # u10/v10 → speed, écrit GeoTIFF dans /coverage/wind-speed-arome/ + GeoJSON
  # arrows dans /wind-arrows/arome_wind_arrows_*.geojson. Layer GeoServer
  # publié au premier cycle = maritime:wind-speed-arome (style SLD partagé
  # avec GFS via provision.sh sprint 11).
  weather-fetcher-arome:
    build: ./services/weather-fetcher-arome
    container_name: maritime-weather-fetcher-arome
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      WIND_DIR: /coverage/wind-speed-arome
      WIND_ARROWS_DIR: /wind-arrows
      # AROME couvre jusqu'à +51h ; on prend 24h pour limiter la charge
      # (4 bundles × 55MB ≈ 220MB / run × 4 runs/jour ≈ 880MB / jour).
      FORECAST_HOURS: "24"
      # Bundles GRIB2 contiennent du pas horaire ; 3h aligne avec le slider GFS.
      SAMPLE_STEP_HOURS: "3"
    volumes:
      - coverage-data:/coverage
      - wind-arrows-data:/wind-arrows
    depends_on:
      - geoserver
    restart: unless-stopped

  # ─── Worker : sst-fetcher (sprint 3) ───────────────────────────────
  # Cron quotidien (06:00 UTC) qui télécharge NOAA OISST v2.1 (NetCDF),
  # subset bbox France métropole, exporte en GeoTIFF dans le mosaic
  # store partagé. Au premier fetch crée le coverage store + active
  # time dimension. Service Python (xarray + rioxarray + gdal natif).
  sst-fetcher:
    build: ./services/sst-fetcher
    container_name: maritime-sst-fetcher
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-maritime}:${RABBITMQ_PASSWORD:-maritime}@rabbitmq:5672
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      COVERAGE_DIR: /coverage/sst-daily
    volumes:
      - coverage-data:/coverage
    depends_on:
      - geoserver
    restart: unless-stopped

  # ─── API NestJS (sprint 5) — auth + palettes utilisateur ──────────
  # Service jeune avec Postgres (réutilise la base maritime existante,
  # 3 nouvelles tables isolées : users, palettes, user_layer_preferences).
  # JWT 24h, mirroring des palettes en styles GeoServer "user_<id>_<slug>".
  api:
    build: ./services/api
    container_name: maritime-api
    env_file: .env
    environment:
      PORT: "3010"
      CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:4204,http://nas:4204}
      DATABASE_URL: postgres://${POSTGRES_USER:-maritime}:${POSTGRES_PASSWORD:-maritime}@postgres:5432/${POSTGRES_DB:-maritime}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-prod}
      JWT_EXPIRES_IN: "24h"
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      GEOSERVER_WORKSPACE: maritime
      PALETTE_LIMIT_PER_USER: "5"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      geoserver:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend Angular + OpenLayers (sprint 1.5) ────────────────────
  # nginx proxy /geoserver/ → service GeoServer interne (CORS-free).
  # nginx proxy /api/ → service api NestJS (sprint 5).
  frontend:
    build: ./frontend
    container_name: maritime-frontend
    ports:
      - "4204:80"
    volumes:
      # Sprint 6 : wind/wave arrows GeoJSON exposés via /wind-arrows/* depuis nginx.
      - wind-arrows-data:/usr/share/nginx/wind-arrows:ro
    depends_on:
      - geoserver
      - api
    restart: unless-stopped

  # ─── Cloudflare Tunnel — exposition publique HTTPS ────────────────
  # Tunnel sortant (le NAS appelle Cloudflare, pas l'inverse) → pas
  # besoin d'ouvrir de port sur la box, pas de NAT. Le routing
  # public-hostname est défini côté dashboard Cloudflare Zero Trust
  # (https://one.dash.cloudflare.com/ → Networks → Tunnels) :
  #   maritime.sladoire.dev → HTTP → frontend:80
  #
  # SSL auto via Cloudflare edge, DDoS protection gratuite, et le cache
  # CDN devant les WMS tiles GeoServer économise pas mal de bande.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: maritime-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  geoserver-data:
  # Volume partagé entre sst-fetcher (writer GeoTIFF) et geoserver
  # (mosaic store reader). Mounted /coverage côté both.
  coverage-data:
  # Sprint 6 : volume GeoJSON arrows (vent + vagues) écrits par
  # weather-fetcher et servis read-only par nginx (frontend) via /wind-arrows/.
  wind-arrows-data:
