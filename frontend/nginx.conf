server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip pour bundles JS/CSS
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # ─── Proxy GeoServer ─────────────────────────────────────────────
  # Le frontend appelle /geoserver/maritime/ows?... → on proxy vers le
  # service interne. Permet d'éviter CORS et de garder une seule
  # origine côté browser.
  location /geoserver/ {
    proxy_pass http://geoserver:8080/geoserver/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WMS GetMap peut renvoyer des PNG lourds — pas de buffer mémoire.
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # ─── SPA fallback : tout le reste retourne index.html ────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long sur les bundles hashés (Angular génère des hash dans le nom).
  location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
