server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip pour bundles JS/CSS
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # ─── Proxy GeoServer ─────────────────────────────────────────────
  # Le frontend appelle /geoserver/maritime/ows?... → on proxy vers le
  # service interne `geoserver`. Depuis sprint 9, ce service est un
  # nginx LB interne qui fanouts vers geoserver-1/2/3 (cluster 3 noeuds
  # avec catalog partagé en Postgres via JDBCConfig). Le frontend ne
  # voit aucun changement — l'alias DNS `geoserver:8080` est conservé.
  location /geoserver/ {
    proxy_pass http://geoserver:8080/geoserver/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WMS GetMap peut renvoyer des PNG lourds — pas de buffer mémoire.
    proxy_buffering off;
    proxy_read_timeout 60s;

    # Retry transparent côté frontend si le LB renvoie 502/503/504 — le
    # LB interne fait déjà du retry sur les replicas, mais double safety
    # net pour les cas de redémarrage simultané.
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  # ─── Proxy API NestJS (sprint 5) ─────────────────────────────────
  # Auth + palettes utilisateur. Le service api écoute sur 3010 dans le
  # réseau interne docker compose.
  location /api/ {
    proxy_pass http://api:3010/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # ─── Phase C.5 (2026-05-12) : cache local des tiles fond de carte ─
  # Le frontend appelle /carto-tiles/{z}/{x}/{y}.png au lieu de
  # https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png.
  # nginx proxy_pass + proxy_cache → tiles servies depuis le cache
  # local après le 1er hit. Réduit le traffic CartoCDN + résilience
  # si CARTO down (cache continue de servir tant que TTL valid).
  #
  # CartoCDN expose 4 sous-domaines (a/b/c/d). On en prend un seul
  # (a.) côté upstream — pas besoin de sharding domain quand on cache
  # localement.
  location ~ ^/carto-tiles/(?<carto_path>.+)$ {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    # Le path frontend est `/carto-tiles/<style>/{z}/{x}/{y}.png` — on
    # forward tel quel à cartocdn (qui attend exactement la même
    # arborescence `<style>/{z}/{x}/{y}.png`).
    proxy_pass https://a.basemaps.cartocdn.com/$carto_path;
    proxy_http_version 1.1;
    proxy_set_header Host a.basemaps.cartocdn.com;
    proxy_ssl_server_name on;
    proxy_ssl_name a.basemaps.cartocdn.com;
    proxy_set_header User-Agent "aetherwx/tile-cache";

    proxy_cache carto_cache;
    proxy_cache_key "$uri";
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 1h;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    add_header X-Cache-Status $upstream_cache_status always;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;

    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  # ─── V2 Sources (2026-05-12) — proxy + cache WMS externes ────────
  # Bathymétrie EMODnet WMS. Cache 14j (data très stable, raster
  # bathymétrique global). Frontend tape sur /wms-emodnet?... au lieu
  # de ows.emodnet-bathymetry.eu directement.
  location /wms-emodnet {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    proxy_pass https://ows.emodnet-bathymetry.eu/wms$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host ows.emodnet-bathymetry.eu;
    proxy_ssl_server_name on;
    proxy_ssl_name ows.emodnet-bathymetry.eu;
    proxy_set_header User-Agent "aetherwx/wms-cache";

    proxy_cache wms_cache;
    proxy_cache_key "$uri?$args";
    proxy_cache_valid 200 14d;
    proxy_cache_valid 404 1h;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Access-Control-Allow-Origin "*";
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  # EMODnet Human Activities WMS — MPA, Natura 2000, pêche, dragage, etc.
  # Cache 30 jours (data statique mise à jour annuellement).
  location /wms-emodnet-human {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    proxy_pass https://ows.emodnet-humanactivities.eu/wms$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host ows.emodnet-humanactivities.eu;
    proxy_ssl_server_name on;
    proxy_ssl_name ows.emodnet-humanactivities.eu;
    proxy_set_header User-Agent "aetherwx/wms-cache";

    proxy_cache wms_cache;
    proxy_cache_key "$uri?$args";
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 1h;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Access-Control-Allow-Origin "*";
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  # Marine Regions WMS — référentiel maritime statique (EEZ, MPA, etc.).
  # Data très stable (mise à jour ~annuelle), cache 30 jours.
  location /wms-marineregions {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    proxy_pass https://geo.vliz.be/geoserver/MarineRegions/wms$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host geo.vliz.be;
    proxy_ssl_server_name on;
    proxy_ssl_name geo.vliz.be;
    proxy_set_header User-Agent "aetherwx/wms-cache";

    proxy_cache wms_cache;
    proxy_cache_key "$uri?$args";
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 1h;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Access-Control-Allow-Origin "*";
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  # EFAS Copernicus forecast crues WMS. Cache 4h (forecast updated
  # ~quotidien, on accepte du léger lag pour décharger upstream).
  location /wms-efas {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    proxy_pass https://gisco-services.ec.europa.eu/maps/wms/efas$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host gisco-services.ec.europa.eu;
    proxy_ssl_server_name on;
    proxy_ssl_name gisco-services.ec.europa.eu;
    proxy_set_header User-Agent "aetherwx/wms-cache";

    proxy_cache wms_cache;
    proxy_cache_key "$uri?$args";
    proxy_cache_valid 200 4h;
    proxy_cache_valid 404 30m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    add_header X-Cache-Status $upstream_cache_status;
    add_header Access-Control-Allow-Origin "*";
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
  }

  # ─── Wind/wave arrows GeoJSON (sprint 6) ─────────────────────────
  # Volume partagé avec weather-fetcher. Sert directement les .geojson
  # comme fichiers statiques. Cache 5min : weather-fetcher écrit toutes
  # les 6h, donc 5min de TTL suffit largement.
  location /wind-arrows/ {
    alias /usr/share/nginx/wind-arrows/;
    add_header Cache-Control "public, max-age=300";
    add_header Access-Control-Allow-Origin "*";
    types {
      application/geo+json geojson;
      application/json json;
    }
    autoindex off;
  }

  # APEX Satellites Phase 4 — la route /satellites/ a été retirée car les
  # GeoTIFF des satellites sont maintenant servis via GeoServer WMS
  # standard sur /geoserver/maritime/wms (LAYERS=maritime:sat-*).

  # ─── SPA fallback : tout le reste retourne index.html ────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long sur les bundles hashés (Angular génère des hash dans le nom).
  location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
