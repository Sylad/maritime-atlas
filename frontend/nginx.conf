server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip pour bundles JS/CSS
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # ─── Proxy GeoServer ─────────────────────────────────────────────
  # Le frontend appelle /geoserver/maritime/ows?... → on proxy vers le
  # service interne `geoserver`. Depuis sprint 9, ce service est un
  # nginx LB interne qui fanouts vers geoserver-1/2/3 (cluster 3 noeuds
  # avec catalog partagé en Postgres via JDBCConfig). Le frontend ne
  # voit aucun changement — l'alias DNS `geoserver:8080` est conservé.
  location /geoserver/ {
    proxy_pass http://geoserver:8080/geoserver/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WMS GetMap peut renvoyer des PNG lourds — pas de buffer mémoire.
    proxy_buffering off;
    proxy_read_timeout 60s;

    # Retry transparent côté frontend si le LB renvoie 502/503/504 — le
    # LB interne fait déjà du retry sur les replicas, mais double safety
    # net pour les cas de redémarrage simultané.
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  # ─── Proxy API NestJS (sprint 5) ─────────────────────────────────
  # Auth + palettes utilisateur. Le service api écoute sur 3010 dans le
  # réseau interne docker compose.
  location /api/ {
    proxy_pass http://api:3010/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # ─── Wind/wave arrows GeoJSON (sprint 6) ─────────────────────────
  # Volume partagé avec weather-fetcher. Sert directement les .geojson
  # comme fichiers statiques. Cache 5min : weather-fetcher écrit toutes
  # les 6h, donc 5min de TTL suffit largement.
  location /wind-arrows/ {
    alias /usr/share/nginx/wind-arrows/;
    add_header Cache-Control "public, max-age=300";
    add_header Access-Control-Allow-Origin "*";
    types {
      application/geo+json geojson;
      application/json json;
    }
    autoindex off;
  }

  # ─── SPA fallback : tout le reste retourne index.html ────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long sur les bundles hashés (Angular génère des hash dans le nom).
  location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
