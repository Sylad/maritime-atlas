# Phase C.5 (2026-05-12) — cache local des tiles fond de carte
# (CARTO dark_nolabels). Réduit le traffic vers basemaps.cartocdn.com
# et donne de la résilience si CARTO est down.
#
# `proxy_cache_path` doit être déclaré au niveau `http {}` — c'est OK
# ici car conf.d/*.conf est incluse depuis http (cf nginx:alpine
# default nginx.conf).
#
# - levels=1:2 → arbo subfolders pour ne pas avoir 1M de fichiers
#   dans 1 seul dir (perf inode lookup).
# - keys_zone=carto_cache:20m → 20MB de RAM pour les keys (≈ 160k keys
#   max, largement assez pour les tiles bbox Europe×8 zoom levels).
# - max_size=2g → 2 GB sur disque, capping le cache. Au-delà, LRU
#   eviction (nginx fait son boulot tout seul).
# - inactive=30d → un tile non-touché depuis 30j est purgé.
# - use_temp_path=off → écriture directe dans le cache (perf).
proxy_cache_path /var/cache/nginx/carto
  levels=1:2
  keys_zone=carto_cache:20m
  max_size=2g
  inactive=30d
  use_temp_path=off;

# V2 Sources (2026-05-12) — cache local des WMS externes (EMODnet
# bathy, EFAS Copernicus crues). Évite de spammer les serveurs publics
# upstream à chaque client qui charge la carte. TTL court (1j) car les
# data EFAS bougent quotidiennement, EMODnet bathy est stable mais
# rester aligné simplifie.
proxy_cache_path /var/cache/nginx/wms
  levels=1:2
  keys_zone=wms_cache:30m
  max_size=4g
  inactive=14d
  use_temp_path=off;
